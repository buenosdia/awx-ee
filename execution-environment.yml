---
version: 3
images:
  base_image:
    name: quay.io/centos/centos:stream9
dependencies:
  python_interpreter:
    package_system: python3.12
    python_path: /usr/bin/python3.12
  ansible_core:
    package_pip: ansible-core>=2.18,<2.19
  ansible_runner:
    package_pip: ansible-runner
  galaxy: |
    ---
    collections:
      - name: amazon.aws
      - name: ansible.netcommon
      - name: ansible.posix
      - name: ansible.utils
      - name: ansible.windows
      - name: awx.awx
      - name: azure.azcollection
        version: ">=2.1.0"
      - name: chocolatey.chocolatey
      - name: cisco.asa
      - name: cisco.intersight
      - name: cisco.ios
      - name: cisco.ise
      - name: cisco.ucs
      - name: cloud.terraform
      - name: community.crypto
      - name: community.general
      - name: community.hashi_vault
      - name: community.vmware
      - name: f5networks.f5_bigip
      - name: f5networks.f5os
      - name: google.cloud
      - name: kubernetes.core
      - name: kubevirt.core
      - name: microsoft.ad
      - name: microsoft.sql
      - name: netbox.netbox
      - name: nutanix.ncp
      - name: openstack.cloud
      - name: ovirt.ovirt
      - name: purestorage.flasharray
      - name: redhatinsights.insights
      - name: theforeman.foreman
  system: |
    git-core [platform:rpm]
    python3.12-devel [platform:rpm compile]
    libcurl-devel [platform:rpm compile]
    krb5-devel [platform:rpm compile]
    krb5-workstation [platform:rpm]
    subversion [platform:rpm]
    subversion [platform:dpkg]
    git-lfs [platform:rpm]
    sshpass [platform:rpm]
    rsync [platform:rpm]
    epel-release [platform:rpm]
    unzip [platform:rpm]
    podman-remote [platform:rpm]
    cmake [platform:rpm compile]
    gcc [platform:rpm compile]
    gcc-c++ [platform:rpm compile]
    make [platform:rpm compile]
    openssl-devel [platform:rpm compile]
  python: |
    ansible-sign
    hvac
    ncclient
    paramiko
    pykerberos
    pyOpenSSL
    pypsrp[kerberos,credssp]
    pywinrm[kerberos,credssp]
    toml
    pexpect>=4.5
    python-daemon
    pyyaml
    six
    receptorctl
    sansldap
    pyspnego
    ucsmsdk
    pytz
    pynetbox
    requests>=2.31.0
additional_build_steps:
  append_base:
    - RUN $PYCMD -m pip install -U pip
  append_final:
    # Receptor pinned to 1.4.x to match AWX 24.6.1 (awx-operator 2.19.1) control-plane receptorctl==1.4.4
    - COPY --from=quay.io/ansible/receptor:v1.4.11 /usr/bin/receptor /usr/bin/receptor
    - RUN mkdir -p /var/run/receptor
    - RUN git lfs install --system
    - RUN alternatives --install /usr/bin/python python /usr/bin/python3.12 312
    # Force-upgrade security-affected packages after collection installs constrain them
    - RUN $PYCMD -m pip install -U --no-cache-dir pip pyOpenSSL
